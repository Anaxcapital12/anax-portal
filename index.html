<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>ANAX Capital</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" crossorigin="anonymous"></script>
<style>

@import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap');
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#070B14;--bg-e:#0D1321;--surface:#141C2E;--surface-r:#1A2340;
  --border:rgba(255,255,255,0.07);--border-a:rgba(68,208,196,0.28);
  --grad:linear-gradient(90deg,#3563DF 0%,#44D0C4 100%);
  --blue:#3563DF;--teal:#44D0C4;--up:#10B981;--down:#EF4444;--warn:#F59E0B;
  --txt:#FFFFFF;--txt2:#9CA3AF;--txt3:#6B7280;--txt4:#4B5563;
  --fd:'Plus Jakarta Sans',sans-serif;--fb:'Inter',sans-serif;--fm:'JetBrains Mono',monospace;
  --sidebar-w:224px;--topbar-h:54px;--t:160ms ease-out;--r:8px;
}
html,body,#root{height:100%}
body{background:var(--bg);color:var(--txt);font-family:var(--fb);font-size:14px;line-height:1.5;-webkit-font-smoothing:antialiased;overflow:hidden}
.portal{display:flex;height:100vh;overflow:hidden}
.sidebar{width:var(--sidebar-w);background:var(--bg-e);border-right:1px solid var(--border);display:flex;flex-direction:column;flex-shrink:0;overflow-y:auto;overflow-x:hidden}
.main{flex:1;display:flex;flex-direction:column;overflow:hidden}
.topbar{height:var(--topbar-h);background:var(--bg-e);border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;padding:0 20px;flex-shrink:0}
.content{flex:1;overflow-y:auto;padding:20px;background:var(--bg)}

/* SIDEBAR */
.sidebar-logo{padding:14px 16px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:center;min-height:64px}
.sidebar-logo img{height:36px;width:auto;object-fit:contain}
.sidebar-user{padding:12px 14px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border)}
.sidebar-avatar{width:32px;height:32px;border-radius:50%;background:var(--grad);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:#fff;flex-shrink:0}
.sidebar-username{font-size:12px;font-weight:600;color:var(--txt);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sidebar-id{font-size:10px;color:var(--txt3);font-family:var(--fm)}
.nav-section{padding:4px 0;flex:1}
.nav-item{display:flex;align-items:center;gap:9px;padding:8px 14px;cursor:pointer;transition:all var(--t);color:var(--txt2);font-size:12px;font-weight:500}
.nav-item:hover{background:rgba(255,255,255,0.04);color:var(--txt)}
.nav-item.active{background:rgba(53,99,223,0.12);color:var(--teal);border-right:2px solid var(--teal)}
.nav-item svg{flex-shrink:0;opacity:.7}
.nav-item.active svg{opacity:1}
.nav-badge-warn{margin-left:auto;background:rgba(245,158,11,.2);color:#F59E0B;font-size:9px;font-weight:700;padding:1px 6px;border-radius:999px}
.nav-sub{padding-left:36px}
.nav-sub .nav-item{font-size:11px;font-weight:400;padding:6px 10px 6px 0}
.sidebar-footer{padding:12px 14px;border-top:1px solid var(--border);margin-top:auto}
.sidebar-footer-text{font-size:9px;color:var(--txt4);text-align:center;line-height:1.6}
.sidebar-footer-text em{color:var(--teal);font-style:normal}

/* TOPBAR */
.topbar-left{display:flex;align-items:center;gap:8px}
.topbar-title{font-family:var(--fd);font-size:15px;font-weight:600;color:var(--txt)}
.topbar-right{display:flex;align-items:center;gap:6px}
.topbar-btn{display:flex;align-items:center;gap:5px;padding:6px 13px;border-radius:6px;font-size:11px;font-weight:600;cursor:pointer;border:none;font-family:var(--fb);transition:all var(--t)}
.tb-primary{background:var(--grad);color:#fff}
.tb-primary:hover{opacity:.9}
.tb-ghost{background:transparent;color:var(--txt2);border:1px solid var(--border)}
.tb-ghost:hover{background:rgba(255,255,255,.04);color:var(--txt)}
.tb-icon{background:transparent;border:none;color:var(--txt3);cursor:pointer;padding:6px;border-radius:6px;transition:all var(--t);display:flex;align-items:center;justify-content:center}
.tb-icon:hover{background:rgba(255,255,255,.06);color:var(--txt)}
.tb-logout{color:var(--down)!important}
.tb-logout:hover{background:rgba(239,68,68,.08)!important}

/* CARDS */
.alert-banner{display:flex;align-items:center;gap:10px;padding:10px 14px;border-radius:var(--r);margin-bottom:16px;font-size:12px}
.alert-warn{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.25);color:#FCD34D}
.alert-link{color:inherit;font-weight:700;text-decoration:underline;cursor:pointer;margin-left:6px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r)}
.card-p{padding:18px}
.card-header{padding:14px 18px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.card-title{font-family:var(--fd);font-size:13px;font-weight:600;color:var(--txt)}

/* ACTION CARDS — main dashboard */
.action-grid{display:grid;grid-template-columns:1.5fr 1fr 1fr 1fr;gap:12px;margin-bottom:16px}
.action-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:20px 18px;display:flex;flex-direction:column;cursor:pointer;transition:all var(--t)}
.action-card:hover{border-color:var(--border-a);transform:translateY(-1px)}
.action-card.dep{background:linear-gradient(160deg,#002E3A 0%,#001520 100%);border-color:rgba(68,208,196,.2)}
.action-icon{width:42px;height:42px;border-radius:11px;display:flex;align-items:center;justify-content:center;margin-bottom:14px;flex-shrink:0}
.ic-dep{background:rgba(68,208,196,.12)}
.ic-with{background:rgba(99,153,34,.1)}
.ic-dl{background:rgba(55,138,221,.1)}
.ic-kyc{background:rgba(245,158,11,.1)}
.action-title{font-size:14px;font-weight:700;color:var(--txt);margin-bottom:5px}
.action-desc{font-size:11px;color:var(--txt3);line-height:1.5;flex:1;margin-bottom:16px}
.action-btn{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;padding:8px 16px;border-radius:7px;border:none;cursor:pointer;font-family:var(--fb);text-decoration:none;transition:all var(--t);align-self:flex-start}
.dep-lbl{font-size:9px;font-weight:700;color:var(--teal);letter-spacing:1.5px;text-transform:uppercase;margin-bottom:8px}
.dep-amt{font-size:38px;font-weight:800;color:var(--txt);line-height:1;margin-bottom:4px}
.dep-sub{font-size:10px;color:var(--txt3);margin-bottom:20px}
@keyframes anax-hb{0%,100%{box-shadow:0 0 0 0 rgba(68,208,196,.5)}70%{box-shadow:0 0 0 12px rgba(68,208,196,0)}}
.dep-cta{background:var(--teal);color:#071020;font-size:14px;font-weight:800;padding:14px;border-radius:10px;border:none;cursor:pointer;width:100%;font-family:var(--fb);animation:anax-hb 1.8s ease-in-out infinite;transition:background .2s}
.dep-cta:hover{background:#00DDEF}
.dep-chips{display:flex;gap:5px;flex-wrap:wrap;margin-top:14px}
.dep-chip{padding:4px 9px;border-radius:4px;font-size:9px;font-weight:600;border:1px solid rgba(68,208,196,.2);color:var(--teal);background:rgba(68,208,196,.05)}
.dep-chip.dim{border-color:var(--border);color:var(--txt4);background:transparent}
.ab-green{background:rgba(99,153,34,.12);color:#7EC43A;border:1px solid rgba(99,153,34,.25)}
.ab-green:hover{background:rgba(99,153,34,.2)}
.ab-blue{background:rgba(55,138,221,.12);color:#378ADD;border:1px solid rgba(55,138,221,.25)}
.ab-blue:hover{background:rgba(55,138,221,.2)}
.ab-amber{background:rgba(245,158,11,.12);color:#F59E0B;border:1px solid rgba(245,158,11,.25)}
.ab-amber:hover{background:rgba(245,158,11,.2)}

/* STAT CARDS */
.stat-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.stat-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:14px}
.stat-val{font-family:var(--fd);font-size:18px;font-weight:700;color:var(--txt)}
.stat-lbl{font-size:10px;color:var(--txt3);margin-top:1px}

/* CHART */
.tv-wrap{position:relative;border-radius:0 0 var(--r) var(--r);overflow:hidden}
.tv-blocker{position:absolute;top:0;left:0;width:100%;height:100%;z-index:10;cursor:pointer;background:transparent}
.tv-brand-cover{position:absolute;bottom:0;right:0;width:180px;height:40px;background:var(--bg);z-index:20;display:flex;align-items:center;justify-content:flex-end;padding-right:12px}
.tv-brand-cover span{font-size:9px;color:var(--txt4)}
.tv-topright-cover{position:absolute;top:0;right:0;width:220px;height:48px;background:var(--bg-e);z-index:20}
.pair-pills{display:flex;gap:6px;flex-wrap:wrap;padding:10px 18px}
.pair-pill{padding:4px 12px;border-radius:999px;font-size:11px;font-weight:600;cursor:pointer;border:1px solid var(--border);background:transparent;color:var(--txt3);font-family:var(--fm);transition:all var(--t)}
.pair-pill:hover{border-color:var(--teal);color:var(--teal)}
.pair-pill.active{background:rgba(68,208,196,.12);border-color:var(--teal);color:var(--teal)}

/* MODALS */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:9999;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(4px)}
.modal-box{background:var(--bg-e);border:1px solid var(--border-a);border-radius:16px;width:420px;max-width:90vw;overflow:hidden;animation:modalIn .2s ease-out}
.modal-box-sm{width:360px}
@keyframes modalIn{from{opacity:0;transform:scale(.95) translateY(8px)}to{opacity:1;transform:scale(1) translateY(0)}}
.modal-header{background:linear-gradient(135deg,#071A2E,#040D1A);padding:18px 22px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.modal-title{font-family:var(--fd);font-size:16px;font-weight:700;color:var(--txt)}
.modal-close{background:transparent;border:none;color:var(--txt3);cursor:pointer;padding:4px;border-radius:6px;display:flex;transition:all var(--t)}
.modal-close:hover{background:rgba(255,255,255,.08);color:var(--txt)}
.modal-body{padding:22px}
.modal-footer-text{padding:0 22px 16px;font-size:10px;color:var(--txt4);text-align:center;line-height:1.7}

/* MISC */
.btn{display:inline-flex;align-items:center;gap:5px;border:none;cursor:pointer;font-family:var(--fb);font-weight:600;transition:all var(--t);border-radius:6px;text-decoration:none}
.btn-sm{padding:5px 12px;font-size:11px}
.btn-md{padding:8px 18px;font-size:12px}
.btn-lg{padding:12px 28px;font-size:14px}
.btn-primary{background:var(--grad);color:#fff}
.btn-primary:hover{opacity:.9}
.btn-teal{background:rgba(68,208,196,.12);color:var(--teal);border:1px solid rgba(68,208,196,.3)}
.btn-teal:hover{background:rgba(68,208,196,.2)}
.btn-ghost{background:transparent;color:var(--txt2);border:1px solid var(--border)}
.btn-ghost:hover{background:rgba(255,255,255,.04);color:var(--txt)}
.btn-danger{background:rgba(239,68,68,.15);color:var(--down);border:1px solid rgba(239,68,68,.3)}
.btn-danger:hover{background:rgba(239,68,68,.25)}
.btn-full{width:100%;justify-content:center}
.badge{display:inline-flex;align-items:center;gap:3px;padding:2px 7px;border-radius:999px;font-size:10px;font-weight:500}
.badge-success{background:rgba(16,185,129,.12);color:#10B981;border:1px solid rgba(16,185,129,.25)}
.badge-warn{background:rgba(245,158,11,.12);color:#F59E0B;border:1px solid rgba(245,158,11,.25)}
.badge-error{background:rgba(239,68,68,.1);color:var(--down);border:1px solid rgba(239,68,68,.2)}
.badge-neutral{background:rgba(255,255,255,.06);color:var(--txt3);border:1px solid var(--border)}
.field{margin-bottom:12px}
.field-label{font-size:11px;font-weight:500;color:var(--txt2);margin-bottom:4px}
.input{background:var(--bg-e);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:8px 11px;font-family:var(--fb);font-size:12px;color:var(--txt);outline:none;width:100%;transition:border-color var(--t)}
.input:focus{border-color:var(--teal);box-shadow:0 0 0 3px rgba(68,208,196,.1)}
.input::placeholder{color:var(--txt4)}
.select{background:var(--bg-e);border:1px solid rgba(255,255,255,.1);border-radius:6px;padding:8px 11px;font-family:var(--fb);font-size:12px;color:var(--txt);outline:none;width:100%;appearance:none;cursor:pointer}
.tabs{display:flex;gap:0;border-bottom:1px solid var(--border);margin-bottom:16px}
.tab{padding:9px 16px;font-size:12px;font-weight:500;color:var(--txt3);cursor:pointer;border-bottom:2px solid transparent;transition:all var(--t);margin-bottom:-1px}
.tab:hover{color:var(--txt)}
.tab.active{color:var(--teal);border-bottom-color:var(--teal)}
.dl-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:12px}
.dl-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--r);padding:22px;display:flex;flex-direction:column;align-items:center;gap:10px;text-align:center;transition:border-color var(--t);cursor:pointer}
.dl-card:hover{border-color:var(--border-a)}
.dl-icon{width:52px;height:52px;border-radius:12px;background:var(--surface-r);display:flex;align-items:center;justify-content:center}
.stepper{display:flex;align-items:center;gap:0;margin-bottom:22px}
.stepper-step{display:flex;align-items:center;gap:6px}
.stepper-circle{width:26px;height:26px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0}
.sc-done{background:var(--up);color:#fff}
.sc-active{background:var(--grad);color:#fff}
.sc-pending{background:var(--surface-r);border:1px solid var(--border);color:var(--txt4)}
.stepper-label{font-size:11px;font-weight:500;color:var(--txt2)}
.stepper-label.active{color:var(--teal)}
.stepper-line{flex:1;height:1px;background:var(--border);min-width:16px}
.info-row{display:flex;align-items:center;padding:9px 0;border-bottom:1px solid var(--border)}
.info-row:last-child{border-bottom:none}
.info-label{font-size:11px;color:var(--txt3);width:160px;flex-shrink:0}
.info-value{font-size:12px;color:var(--txt);flex:1}
.info-action{margin-left:auto}
.empty{text-align:center;padding:40px 20px}
.empty-title{font-size:13px;font-weight:600;color:var(--txt2);margin-bottom:4px}
.empty-desc{font-size:11px;color:var(--txt4)}
.upload-drop{border:2px dashed rgba(255,255,255,.1);border-radius:var(--r);padding:28px;text-align:center;cursor:pointer;transition:border-color var(--t)}
.upload-drop:hover{border-color:rgba(68,208,196,.35)}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.font-mono{font-family:var(--fm)}
.grad-text{background:var(--grad);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.1);border-radius:2px}
::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.18)}
.redirect-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;height:300px;gap:14px}
.redirect-spinner{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--teal);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

#loading{position:fixed;inset:0;background:#070B14;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;z-index:99999}
#loading .sp{width:40px;height:40px;border:3px solid rgba(68,208,196,.2);border-top-color:#44D0C4;border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
#loading .lt{font-family:"Segoe UI",Arial,sans-serif;font-size:13px;color:#44D0C4;font-weight:600}
#loading .ls{font-size:11px;color:#4B5563;margin-top:-8px}
</style>
</head>

/* ── TRADINGVIEW CHART ───────────────────────────────────────── */
function TVChart({ symbol, height, onBlockedClick }) {
  const ref = useRef(null);
  const loaded = useRef(false);
  const key = useRef(symbol);

  useEffect(() => {
    if(!ref.current) return;
    // Clear and reload when symbol changes
    ref.current.innerHTML = '';
    loaded.current = false;
    key.current = symbol;

    const container = document.createElement('div');
    container.className = 'tradingview-widget-container';
    container.style.height = height + 'px';
    container.style.width = '100%';
    const widget = document.createElement('div');
    widget.className = 'tradingview-widget-container__widget';
    widget.style.height = '100%';
    container.appendChild(widget);
    ref.current.appendChild(container);

    const s = document.createElement('script');
    s.src = 'https://s3.tradingview.com/external-embedding/embed-widget-advanced-chart.js';
    s.async = true;
    s.innerHTML = JSON.stringify({
      autosize:true, symbol, interval:'H1', timezone:'Asia/Dubai',
      theme:'dark', style:'1', locale:'en',
      backgroundColor:'rgba(7,11,20,1)',
      gridColor:'rgba(255,255,255,0.04)',
      hide_top_toolbar:false, hide_legend:false,
      save_image:false, withdateranges:true,
      allow_symbol_change:false,
      details:false, hotlist:false, calendar:false,
      studies:['RSI@tv-basicstudies'],
    });
    container.appendChild(s);
    loaded.current = true;
  }, [symbol]);

  return (
    <div className="tv-wrap" style={{height}}>
      <div ref={ref} style={{width:'100%',height:'100%'}}/>
      <div className="tv-blocker" onClick={onBlockedClick}/>
      <div className="tv-brand-cover"><span>Market Data</span></div>
      <div className="tv-topright-cover"/>
    </div>
  );
}

function Icon({ d, size=16 }) {
  const paths = d.split(' M ').map((p,i)=>i===0?p:'M '+p);
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round">
      {paths.map((p,i)=><path key={i} d={p.trim()}/>)}
    </svg>
  );
}

/* ── SIDEBAR ─────────────────────────────────────────────────── */
function Sidebar({ screen, setScreen, onLogout }) {
  const [exp, setExp] = useState({accounts:true,funds:true,profile:true});
  const toggle = id => setExp(p=>({...p,[id]:!p[id]}));
  const isActive = id => screen===id||screen.startsWith(id+'/');

  function handleItem(item) {
    if(item.url) navigate(item.url);
    else if(item.children) toggle(item.id);
    else setScreen(item.id);
  }
  function handleChild(ch) {
    if(ch.url) navigate(ch.url);
    else setScreen(ch.id);
  }

  return (
    <aside className="sidebar">
      <div className="sidebar-logo">
        <img src={LOGO} alt="ANAX Capital"/>
      </div>
      <div className="sidebar-user">
        <div className="sidebar-avatar">SS</div>
        <div>
          <div className="sidebar-username">Shubham Shukla</div>
          <div className="sidebar-id">#16909</div>
        </div>
      </div>
      <div className="nav-section">
        {NAV.map(item=>(
          <div key={item.id}>
            <div className={`nav-item ${isActive(item.id)&&!item.children?'active':''}`}
              onClick={()=>handleItem(item)}
              style={item.children&&isActive(item.id)?{color:'var(--teal)'}:{}}>
              <Icon d={item.icon}/>
              <span>{item.label}</span>
              {item.children&&(
                <svg style={{marginLeft:'auto',transition:'200ms',transform:exp[item.id]?'rotate(90deg)':''}} width="10" height="10" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><polyline points="9 18 15 12 9 6"/></svg>
              )}
            </div>
            {item.children&&exp[item.id]&&(
              <div className="nav-sub">
                {item.children.map(ch=>(
                  <div key={ch.id} className={`nav-item ${screen===ch.id?'active':''}`} onClick={()=>handleChild(ch)}>
                    <span>{ch.label}</span>
                    {ch.badge&&<span className="nav-badge-warn">{ch.badge}</span>}
                  </div>
                ))}
              </div>
            )}
          </div>
        ))}
      </div>
      <div className="sidebar-footer">
        <div className="sidebar-footer-text">
          Powered by <em>Anax Capital</em><br/>
          Financial Markets LLC<br/>
          SCA License No. 20200000258
        </div>
      </div>
    </aside>
  );
}

/* ── STEPPER ─────────────────────────────────────────────────── */
function Stepper({ steps, current }) {
  return (
    <div className="stepper">
      {steps.map((s,i)=>(
        <React.Fragment key={s}>
          <div className="stepper-step">
            <div className={`stepper-circle ${i<current?'sc-done':i===current?'sc-active':'sc-pending'}`}>
              {i<current?<svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5"><polyline points="20 6 9 17 4 12"/></svg>:i+1}
            </div>
            <span className={`stepper-label ${i===current?'active':''}`}>{s}</span>
          </div>
          {i<steps.length-1&&<div className="stepper-line"/>}
        </React.Fragment>
      ))}
    </div>
  );
}

    {name:'MT5 Android',sub:'Android devices',icon:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" strokeWidth="1.5"><path d="M6 18V8a6 6 0 0 1 12 0v10"/><path d="M3 14h18v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4z"/></svg>},
    {name:'Web Trader',sub:'Browser — no download',icon:<svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="var(--teal)" strokeWidth="1.5"><circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/><path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/></svg>},
  ];
  return (
    <div>
      <div className="dl-grid">
        {platforms.map(p=>(
          <div key={p.name} className="dl-card" onClick={()=>navigate(URLS.downloads)}>
            <div className="dl-icon">{p.icon}</div>
            <div><div style={{fontFamily:'var(--fd)',fontWeight:600,fontSize:14,marginBottom:2}}>{p.name}</div><div style={{fontSize:11,color:'var(--txt3)'}}>{p.sub}</div></div>
            <button className="btn btn-sm btn-primary" onClick={e=>{e.stopPropagation();navigate(URLS.downloads)}}>
              <svg width="11" height="11" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              Download
            </button>
          </div>
        ))}
      </div>
    </div>
  );
}

function EconomicCalendar() {
  return (
    <div className="card" style={{overflow:'hidden'}}>
      <div className="card-header">
        <span className="card-title">Economic Calendar</span>
        <button className="btn btn-sm btn-ghost" onClick={()=>navigate(URLS.calendar)}>Open Full Calendar →</button>
      </div>
      <div style={{padding:20,textAlign:'center'}}>
        <div style={{fontSize:13,color:'var(--txt3)',marginBottom:16}}>View the full economic calendar with filters on the portal.</div>
        <button className="btn btn-md btn-primary" onClick={()=>navigate(URLS.calendar)}>Open Economic Calendar</button>
      </div>
    </div>
  );
}

/* ── REDIRECT ────────────────────────────────────────────────── */
function Redirect({ url }) {
  useEffect(()=>{window.top.location.href=url;},[]);
  return (
    <div className="redirect-screen">
      <div className="redirect-spinner"></div>
      <div style={{fontSize:13,color:'var(--txt3)'}}>Redirecting...</div>
    </div>
  );
}

/* ── SCREEN ROUTER ───────────────────────────────────────────── */
function ScreenContent({ screen, onFund }) {
  switch(screen) {
    case 'dashboard':           return <Dashboard onFund={onFund}/>;
    case 'accounts/overview':   return <AccountOverview/>;
    case 'accounts/demo':       return <Redirect url={URLS.accountsDemo}/>;
    case 'accounts/live':       return <Redirect url={URLS.accountsLive}/>;
    case 'funds/deposit':       return <DepositFunds/>;
    case 'funds/withdraw':      return <WithdrawFunds/>;
    case 'funds/transfer':      return <TransferFunds/>;
    case 'funds/history':       return <TransactionHistory/>;
    case 'funds/wallets':       return <Redirect url={URLS.wallets}/>;
    case 'profile/info':        return <ProfileInfo/>;
    case 'profile/kyc':         return <KYCScreen/>;
    case 'profile/documents':   return <AdditionalDocs/>;
    case 'profile/agreements':  return <Agreements/>;
    case 'profile/messages':    return <Messages/>;
    case 'profile/helpdesk':    return <HelpDesk/>;
    case 'profile/2fa':         return <TwoFA/>;
    case 'downloads':           return <Downloads/>;
    case 'calendar':            return <EconomicCalendar/>;
    default:                    return <Dashboard onFund={onFund}/>;
  }
}

/* ── APP ─────────────────────────────────────────────────────── */
function App() {
  const [screen, setScreen] = useState('dashboard');
  const [showFund, setShowFund] = useState(false);
  const [showLogout, setShowLogout] = useState(false);

  useEffect(()=>{
    // Block ALL external navigation globally
    const origOpen = window.open.bind(window);
    window.open = function(url,...args){
      if(url&&(url.includes('tradingview.com')||url.startsWith('http'))) return null;
      return origOpen(url,...args);
    };
    document.addEventListener('click',function(e){
      const a = e.target.closest('a[href]');
      if(!a) return;
      const href = a.getAttribute('href');
      if(href&&href.startsWith('http')&&!href.includes('portal.anaxcapital.ae')){
        e.preventDefault();e.stopPropagation();
      }
    },true);
  },[]);

  return (
    <div className="portal">
      {showFund&&<FundPopup onClose={()=>setShowFund(false)}/>}
      {showLogout&&<LogoutPopup onClose={()=>setShowLogout(false)}/>}
      <Sidebar screen={screen} setScreen={setScreen} onLogout={()=>setShowLogout(true)}/>
      <div className="main">
        <Topbar screen={screen} onLogout={()=>setShowLogout(true)}/>
        <div className="content">
          <ScreenContent screen={screen} onFund={()=>setShowFund(true)}/>
        </div>
      </div>
    </div>
  );
}


function AppWithLoader() {
  React.useEffect(() => {
    const loader = document.getElementById('loading');
    if(loader) loader.style.display = 'none';
  }, []);
  return React.createElement(App, null);
}
ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(AppWithLoader, null));


</script>
</body>
</html>
